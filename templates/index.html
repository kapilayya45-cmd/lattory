<!DOCTYPE html>
<html>
<head>
  <title>Lottery App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      min-height: 100vh;
    }

    .left {
      flex: 1;
      padding: 20px;
    }

    .right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      min-height: 300px;
    }

    .right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: gold;
      font-weight: bold;
      cursor: pointer;
    }

    h2 {
      color: gold;
    }

    .card {
      background: #1e293b;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }

    @media(max-width: 768px) {
      .container {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <h2>🎰 Daily Lottery</h2>
    <p>⏰ Draw Time: Daily 8:00 PM</p>

    <!-- VARIANTS -->
    <div class="card">📱 Budget Kings (₹10,000 mobiles)</div>
    <div class="card">🔥 Mid Range (₹50,000 mobiles)</div>
    <div class="card">👑 Premium (iPhone / Flagship)</div>

    <br>

    <input id="username" placeholder="Username">
    <input id="password" placeholder="Password">
    <br>

    <button onclick="signup()">Signup</button>
    <button onclick="login()">Login</button>

    <br><br>

    <input id="number" placeholder="Ticket Number">
    <button onclick="buy()">Buy Ticket</button>

    <br><br>

    <button onclick="draw()">Draw Winner</button>

    <h3 id="status"></h3>

  </div>

  <!-- RIGHT IMAGES -->
  <div class="right">
    <img id="slider" src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
  </div>

</div>

<script>
let user;

// ✅ MOBILE IMAGES (REAL PHONE IMAGES)
const images = [
  "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9",
  "https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5",
  "https://images.unsplash.com/photo-1512499617640-c2f999098c01",
  "https://images.unsplash.com/photo-1517336714731-489689fd1ca8"
];

let i = 0;

setInterval(() => {
  i = (i + 1) % images.length;
  document.getElementById("slider").src = images[i];
}, 2500);

// BACKEND URL
const API = "http://localhost:3000";

// SIGNUP
async function signup() {
  await fetch(API + "/signup", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });
  status.innerText = "Signup success";
}

// LOGIN
async function login() {
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  user = await res.json();
  status.innerText = "Logged in";
}

// BUY
async function buy() {
  if(!user) return status.innerText = "Login first";

  await fetch(API + "/buy", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      userId: user._id,
      number: number.value
    })
  });

  status.innerText = "Ticket Bought";
}

// DRAW (simulate 8PM)
async function draw() {
  const now = new Date();
  const hour = now.getHours();

  if(hour !== 20){
    status.innerText = "Draw only at 8PM";
    return;
  }

  const res = await fetch(API + "/draw");
  const data = await res.json();

  status.innerText = "Winner: " + data.winner.userId;
}
</script>

</body>
</html>
