<!DOCTYPE html>
<html>
<head>
  <title>Lottery App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .left {
      width: 60%;
      padding: 30px;
    }

    .right {
      width: 40%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
    }

    .right img {
      width: 90%;
      height: 90%;
      object-fit: cover;
      border-radius: 15px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: gold;
      cursor: pointer;
    }

    h2 {
      color: gold;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <h2>🎰 Lottery Game</h2>

    <input id="username" placeholder="Username">
    <input id="password" placeholder="Password">
    <br>

    <button onclick="signup()">Signup</button>
    <button onclick="login()">Login</button>

    <br><br>

    <input id="number" placeholder="Ticket Number">
    <button onclick="buy()">Buy Ticket</button>

    <br><br>

    <button onclick="draw()">Draw Winner</button>

    <h3 id="status"></h3>
  </div>

  <!-- RIGHT SIDE IMAGE -->
  <div class="right">
    <img id="slider" src="https://picsum.photos/400/600?1">
  </div>

</div>

<script>
let user;

// IMAGE SLIDER
const images = [
  "https://picsum.photos/400/600?1",
  "https://picsum.photos/400/600?2",
  "https://picsum.photos/400/600?3",
  "https://picsum.photos/400/600?4"
];

let i = 0;

setInterval(() => {
  i = (i + 1) % images.length;
  document.getElementById("slider").src = images[i];
}, 2000);

// BACKEND URL (change if deployed)
const API = "http://localhost:3000";

// SIGNUP
async function signup() {
  await fetch(API + "/signup", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  status.innerText = "Signup success";
}

// LOGIN
async function login() {
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  user = await res.json();
  status.innerText = "Logged in";
}

// BUY
async function buy() {
  await fetch(API + "/buy", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      userId: user._id,
      number: number.value
    })
  });

  status.innerText = "Ticket Bought";
}

// DRAW
async function draw() {
  const res = await fetch(API + "/draw");
  const data = await res.json();

  status.innerText = "Winner: " + data.winner.userId;
}
</script>

</body>
</html>
