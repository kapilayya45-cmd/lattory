<!DOCTYPE html>
<html>
<head>
  <title>Lottery App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      min-height: 100vh;
    }

    .left {
      flex: 1;
      padding: 20px;
    }

    .right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      min-height: 300px;
    }

    .right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: gold;
      font-weight: bold;
    }

    .card {
      background: #1e293b;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <h2>🎰 Daily Lottery</h2>
    <p>⏰ Draw: 8PM</p>

    <div class="card">📱 ₹10,000 Mobiles</div>
    <div class="card">🔥 ₹50,000 Mobiles</div>
    <div class="card">👑 Premium iPhones</div>

    <input id="username" placeholder="Username">
    <input id="password" placeholder="Password"><br>

    <button onclick="signup()">Signup</button>
    <button onclick="login()">Login</button>

    <br><br>

    <input id="number" placeholder="Ticket">
    <button onclick="buy()">Buy</button>

    <br><br>

    <button onclick="draw()">Draw</button>

    <h3 id="status"></h3>
  </div>

  <!-- RIGHT IMAGE -->
  <div class="right">
    <img id="slider" src="https://dummyimage.com/400x600/000/fff&text=Mobile+Lottery">
  </div>

</div>

<script>
let user;

// ✅ SUPER SAFE IMAGES (always load)
const images = [
  "https://dummyimage.com/400x600/000/fff&text=Budget+Mobile",
  "https://dummyimage.com/400x600/111/fff&text=50K+Mobile",
  "https://dummyimage.com/400x600/222/fff&text=iPhone+Premium",
  "https://dummyimage.com/400x600/333/fff&text=Win+Now"
];

let i = 0;

setInterval(() => {
  i = (i + 1) % images.length;
  document.getElementById("slider").src = images[i];
}, 2000);

// BACKEND
const API = "http://localhost:3000";

async function signup() {
  await fetch(API + "/signup", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });
  status.innerText = "Signup done";
}

async function login() {
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  user = await res.json();
  status.innerText = "Login success";
}

async function buy() {
  if(!user) return status.innerText = "Login first";

  await fetch(API + "/buy", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      userId: user._id,
      number: number.value
    })
  });

  status.innerText = "Ticket bought";
}

async function draw() {
  const now = new Date();

  if(now.getHours() !== 20){
    status.innerText = "Draw at 8PM only";
    return;
  }

  const res = await fetch(API + "/draw");
  const data = await res.json();

  status.innerText = "Winner: " + data.winner.userId;
}
</script>

</body>
</html>
